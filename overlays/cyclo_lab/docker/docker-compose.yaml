# Extension fields for reusable configurations
x-default-cyclo-lab-volumes: &default-cyclo-lab-volumes
  # Isaac Sim cache volumes
  - type: volume
    source: isaac-cache-kit
    target: ${DOCKER_ISAACSIM_ROOT_PATH}/kit/cache
  - type: volume
    source: isaac-cache-ov
    target: ${DOCKER_USER_HOME}/.cache/ov
  - type: volume
    source: isaac-cache-pip
    target: ${DOCKER_USER_HOME}/.cache/pip
  - type: volume
    source: isaac-cache-gl
    target: ${DOCKER_USER_HOME}/.cache/nvidia/GLCache
  - type: volume
    source: isaac-cache-compute
    target: ${DOCKER_USER_HOME}/.nv/ComputeCache
  - type: volume
    source: isaac-logs
    target: ${DOCKER_USER_HOME}/.nvidia-omniverse/logs
  - type: volume
    source: isaac-carb-logs
    target: ${DOCKER_ISAACSIM_ROOT_PATH}/kit/logs/Kit/Isaac-Sim
  - type: volume
    source: isaac-data
    target: ${DOCKER_USER_HOME}/.local/share/ov/data
  - type: volume
    source: isaac-docs
    target: ${DOCKER_USER_HOME}/Documents
  # Bind mount the Cyclo Lab repository so source files and Git state match the host checkout.
  - type: bind
    source: ../
    target: ${DOCKER_CYCLOLAB_PATH}
  # Isaac Lab volumes for artifacts (third_party/IsaacLab)
  - type: volume
    source: isaac-lab-docs
    target: ${DOCKER_ISAACLAB_PATH}/docs/_build
  - type: volume
    source: isaac-lab-logs
    target: ${DOCKER_ISAACLAB_PATH}/logs
  - type: volume
    source: isaac-lab-data
    target: ${DOCKER_ISAACLAB_PATH}/data_storage
  # Bash history
  - type: bind
    source: .cyclo-lab-docker-history
    target: ${DOCKER_USER_HOME}/.bash_history

x-default-cyclo-lab-environment: &default-cyclo-lab-environment
  - ISAACSIM_PATH=${DOCKER_ISAACSIM_ROOT_PATH}
  - ISAACLAB_PATH=${DOCKER_ISAACLAB_PATH}
  - CYCLOLAB_PATH=${DOCKER_CYCLOLAB_PATH}
  - OMNI_KIT_ALLOW_ROOT=1
  - ACCEPT_EULA=${ACCEPT_EULA}
  - PRIVACY_CONSENT=Y
  - NVIDIA_VISIBLE_DEVICES=all
  - NVIDIA_DRIVER_CAPABILITIES=all

x-default-cyclo-lab-deploy: &default-cyclo-lab-deploy
  resources:
    reservations:
      devices:
        - driver: nvidia
          count: all
          capabilities: [ gpu ]

services:
  cyclo_lab:
    profiles: [ "base" ]
    env_file: .env.base
    image: robotis/cyclo-lab${DOCKER_NAME_SUFFIX}:latest
    container_name: cyclo_lab${DOCKER_NAME_SUFFIX}
    build:
      context: ../
      dockerfile: docker/Dockerfile.base
      args:
        - ISAACSIM_BASE_IMAGE_ARG=${ISAACSIM_BASE_IMAGE}
        - ISAACSIM_VERSION_ARG=${ISAACSIM_VERSION}
        - ISAACSIM_ROOT_PATH_ARG=${DOCKER_ISAACSIM_ROOT_PATH}
        - CYCLOLAB_PATH_ARG=${DOCKER_CYCLOLAB_PATH}
        - DOCKER_USER_HOME_ARG=${DOCKER_USER_HOME}
      network: host
    stdin_open: true
    tty: true
    network_mode: host
    privileged: true
    shm_size: "16gb"
    volumes: *default-cyclo-lab-volumes
    environment: *default-cyclo-lab-environment
    deploy: *default-cyclo-lab-deploy

volumes:
  isaac-cache-kit:
  isaac-cache-ov:
  isaac-cache-pip:
  isaac-cache-gl:
  isaac-cache-compute:
  isaac-logs:
  isaac-carb-logs:
  isaac-data:
  isaac-docs:
  isaac-lab-docs:
  isaac-lab-logs:
  isaac-lab-data:
